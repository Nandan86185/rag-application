<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Frontend</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <script>
    window.addEventListener('error', function(e) {
      document.body.innerHTML += '<div style="color:red; font-size: 20px; z-index:9999; position:absolute; top:0; left:0; background:white; padding:20px; box-shadow:0 0 10px black;"><strong>Error:</strong> ' + e.message + '<br><em>' + e.filename + ':' + e.lineno + '</em></div>';
    });
    window.addEventListener('unhandledrejection', function(e) {
      document.body.innerHTML += '<div style="color:red; font-size: 20px; z-index:9999; position:absolute; top:0; left:0; background:white; padding:20px; box-shadow:0 0 10px black;"><strong>Promise Error:</strong> ' + (e.reason ? e.reason.message || e.reason : 'Unknown') + '</div>';
    });
  </script>
</head>
<body>
  <app-root></app-root>
</body>
</html>
